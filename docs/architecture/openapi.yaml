      summary: Get security policy settings (2FA enforcement etc.)
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Security settings
    put:
      tags: [admin]
      summary: Update security policy (admin)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                require2FA:
                  type: boolean
      responses:
        '200':
          description: Updated

  /admin/role-settings:
    get:
      tags: [admin]
      summary: Get role-specific settings (CISO/GDPO/ICS, contentowner+)
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Role settings object
    put:
      tags: [admin]
      summary: Update role-specific settings (contentowner+)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated

  /admin/audit-log:
    get:
      tags: [admin]
      summary: Get audit log with filters and pagination (admin)
      security:
        - cookieAuth: []
      parameters:
        - name: user
          in: query
          schema:
            type: string
        - name: action
          in: query
          schema:
            type: string
        - name: resource
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Paginated audit log entries
    delete:
      tags: [admin]
      summary: Clear audit log (admin)
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Cleared

  /admin/export:
    get:
      tags: [admin]
      summary: Full JSON export of all data (admin)
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Complete data export as JSON

  /admin/maintenance/cleanup:
    post:
      tags: [admin]
      summary: Clean up orphaned file attachments (admin)
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Cleanup result

  # ─── PUBLIC ───────────────────────────────────────────────────────────────

  /public/entities:
    get:
      tags: [public]
      summary: List entities (no auth required — used on public incident form)
      responses:
        '200':
          description: Array of entities (id and name only)

  /public/incident:
    post:
      tags: [public]
      summary: Submit a public security incident report (no auth required)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, description]
              properties:
                title:
                  type: string
                description:
                  type: string
                reporterName:
                  type: string
                reporterEmail:
                  type: string
                affectedSystem:
                  type: string
                severity:
                  type: string
                entityId:
                  type: string
      responses:
        '201':
          description: Incident submitted — returns reference number (INC-YYYY-NNNN)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ref:
                    type: string
                    example: INC-2026-0001

  /public/incidents:
    get:
      tags: [public]
      summary: List public incident reports — CISO inbox (contentowner+)
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Array of public incident reports

  /public/incident/{id}:
    get:
      tags: [public]
      summary: Get single public incident (contentowner+)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Incident
    put:
      tags: [public]
      summary: Update public incident status/notes (contentowner+)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated
    delete:
      tags: [public]
      summary: Soft-delete public incident (admin)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted

  /public/incident/{id}/permanent:
    delete:
      tags: [public]
      summary: Permanently delete public incident (admin)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Permanently deleted

  /public/incident/{id}/restore:
    post:
      tags: [public]
      summary: Restore soft-deleted public incident (admin)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Restored

  # ─── TRASH ────────────────────────────────────────────────────────────────

  /trash:
    get:
      tags: [trash]
      summary: List all soft-deleted records across all modules (admin)
      description: |
        Aggregates deleted records from: templates, risks, goals, guidance,
        training, legal (contracts/ndas/policies), gdpr (vvt/av/dsfa/incidents/dsar/toms),
        public-incidents. Does NOT include users, entities, or audit log entries.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Array of deleted records with module and type information
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    module:
                      type: string
                    type:
                      type: string
                    id:
                      type: string
                    title:
                      type: string
                    deletedAt:
                      type: string
                      format: date-time
                    deletedBy:
                      type: string
