openapi: 3.0.3

info:
  title: ISMS Builder API
  version: 1.0.0
  description: |
    REST API for the ISMS Builder platform — a self-hosted Information Security
    Management System (ISMS) according to ISO 27001:2022, NIS2, GDPR, BSI
    IT-Grundschutz and other frameworks.

    **Authentication:** All protected endpoints require a valid JWT cookie
    (`sm_session`). Obtain it via `POST /login`.

    **RBAC Roles (ascending rank):**
    - `reader` / `revision` (rank 1) — read access
    - `editor` / `dept_head` / `qmb` (rank 2) — create/edit
    - `contentowner` / `auditor` (rank 3) — approve, CISO/DSB settings
    - `admin` (rank 4) — user management, delete, system config

  contact:
    name: Claude Hecker
  license:
    name: AGPL-3.0
    url: https://www.gnu.org/licenses/agpl-3.0.html

servers:
  - url: /
    description: Self-hosted instance

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sm_session

  schemas:
    CommonFields:
      type: object
      properties:
        id:
          type: string
          example: lx3k8fab2c
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deletedAt:
          type: string
          format: date-time
          nullable: true
        linkedControls:
          type: array
          items:
            type: string
          example: ["ISO-5.1", "BSI-ORP.3"]
        linkedPolicies:
          type: array
          items:
            type: string

    Error:
      type: object
      properties:
        error:
          type: string

    User:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [reader, revision, editor, dept_head, qmb, contentowner, auditor, admin]
        domain:
          type: string
        sections:
          type: array
          items:
            type: string

    Template:
      allOf:
        - $ref: '#/components/schemas/CommonFields'
        - type: object
          properties:
            type:
              type: string
            language:
              type: string
            title:
              type: string
            content:
              type: string
            owner:
              type: string
            version:
              type: integer
            status:
              type: string
              enum: [draft, review, approved, archived]
            parentId:
              type: string
              nullable: true
            sortOrder:
              type: integer
            nextReviewDate:
              type: string
              format: date
            applicableEntities:
              type: array
              items:
                type: string
            attachments:
              type: array
              items:
                type: object

    SoaControl:
      type: object
      properties:
        id:
          type: string
        framework:
          type: string
        theme:
          type: string
        title:
          type: string
        applicable:
          type: boolean
        status:
          type: string
          enum: [not_started, in_progress, implemented, not_applicable]
        owner:
          type: string
        justification:
          type: string
        linkedTemplates:
          type: array
          items:
            type: string
        applicableEntities:
          type: array
          items:
            type: string

    Risk:
      allOf:
        - $ref: '#/components/schemas/CommonFields'
        - type: object
          properties:
            title:
              type: string
            category:
              type: string
            description:
              type: string
            probability:
              type: integer
              minimum: 1
              maximum: 5
            impact:
              type: integer
              minimum: 1
              maximum: 5
            score:
              type: integer
            treatment:
              type: string
              enum: [mitigate, accept, avoid, transfer]
            status:
              type: string
              enum: [open, in_progress, closed]
            owner:
              type: string
            treatments:
              type: array
              items:
                type: object

    Asset:
      allOf:
        - $ref: '#/components/schemas/CommonFields'
        - type: object
          properties:
            name:
              type: string
            category:
              type: string
              enum: [hardware, software, data, service, facility]
            type:
              type: string
            classification:
              type: string
              enum: [public, internal, confidential, strictly_confidential]
            criticality:
              type: string
              enum: [low, medium, high, critical]
            owner:
              type: string
            location:
              type: string
            status:
              type: string
            endOfLifeDate:
              type: string
              format: date
            entityId:
              type: string

    Goal:
      allOf:
        - $ref: '#/components/schemas/CommonFields'
        - type: object
          properties:
            title:
              type: string
            description:
              type: string
            category:
              type: string
            status:
              type: string
              enum: [planned, active, achieved, missed, cancelled]
            priority:
              type: string
              enum: [low, medium, high, critical]
            owner:
              type: string
            targetDate:
              type: string
              format: date
            reviewDate:
              type: string
              format: date
            progress:
              type: integer
            kpis:
              type: array
              items:
                type: object

    Entity:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        short:
          type: string
        type:
          type: string
          enum: [holding, subsidiary, branch, department]
        parentId:
          type: string
          nullable: true
        sortOrder:
          type: integer

tags:
  - name: auth
    description: Authentication, session management, 2FA
  - name: templates
    description: Policy/procedure templates, versioning, hierarchy, attachments
  - name: entities
    description: Corporate/organisational entity structure
  - name: soa
    description: Statement of Applicability — controls across 8 frameworks
  - name: risks
    description: Risk register and treatment plans
  - name: goals
    description: Security objectives / KPI tracking (ISO 27001 §6.2)
  - name: assets
    description: Asset inventory and classification (ISO 27001 A.5.9–5.12)
  - name: governance
    description: Management reviews, action items, meeting minutes
  - name: bcm
    description: Business continuity — BIA, plans, exercises
  - name: calendar
    description: Aggregated calendar events from all modules
  - name: guidance
    description: Guidance documents with file upload
  - name: gdpr
    description: GDPR & privacy — VVT, AV, DSFA, TOMs, DSAR, incidents, DSB
  - name: reports
    description: Compliance matrix, gap analysis, CSV export
  - name: legal
    description: Contracts, NDAs, privacy policies
  - name: training
    description: Training records and completion tracking
  - name: admin
    description: User management, org settings, audit log, maintenance
  - name: public
    description: Public endpoints (no authentication required)
  - name: trash
    description: Soft-delete trash, restore, permanent delete

paths:

  # ─── AUTH ────────────────────────────────────────────────────────────────

  /login:
    post:
      tags: [auth]
      summary: Authenticate and obtain session cookie
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
                totpCode:
                  type: string
                  description: TOTP code (required if 2FA is enabled)
      responses:
        '200':
          description: Login successful — sets sm_session cookie
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  role:
                    type: string
                  has2FA:
                    type: boolean
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: 2FA required or TOTP invalid

  /whoami:
    get:
      tags: [auth]
      summary: Get current authenticated user info
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/User'
                  - type: object
                    properties:
                      has2FA:
                        type: boolean
        '401':
          description: Not authenticated

  /logout:
    get:
      tags: [auth]
      summary: Logout — clears session cookie
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Logged out

  /me/password:
    put:
      tags: [auth]
      summary: Change own password
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
      responses:
        '200':
          description: Password changed
        '400':
          description: Current password wrong or validation error
        '401':
          description: Not authenticated

  /2fa/setup:
    get:
      tags: [auth]
      summary: Initiate 2FA setup — returns QR code URI and secret
      security:
        - cookieAuth: []
      responses:
        '200':
          description: QR code data
          content:
            application/json:
              schema:
                type: object
                properties:
                  qrDataUri:
                    type: string
                    description: Data URI of QR code image
                  secret:
                    type: string
                    description: Base32 TOTP secret

  /2fa/verify:
    post:
      tags: [auth]
      summary: Verify TOTP code and activate 2FA
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
      responses:
        '200':
          description: 2FA activated
        '400':
          description: Invalid code

  /2fa:
    delete:
      tags: [auth]
      summary: Disable 2FA for current user
      security:
        - cookieAuth: []
      responses:
        '200':
          description: 2FA disabled

  # ─── TEMPLATES ───────────────────────────────────────────────────────────

  /templates:
    get:
      tags: [templates]
      summary: List templates
      security:
        - cookieAuth: []
      parameters:
        - name: type
          in: query
          schema:
            type: string
        - name: language
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Array of templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Template'

  /templates/tree:
    get:
      tags: [templates]
      summary: Get templates as a nested tree (by type/language)
      security:
        - cookieAuth: []
      parameters:
        - name: type
          in: query
          schema:
            type: string
        - name: language
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Nested tree structure
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /templates/reorder:
    post:
      tags: [templates]
      summary: Batch-update sortOrder for sibling templates (contentowner+)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                updates:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      sortOrder:
                        type: integer
      responses:
        '200':
          description: Reordered

  /template:
    post:
      tags: [templates]
      summary: Create a new template (contentowner+)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, language, title]
              properties:
                type:
                  type: string
                language:
                  type: string
                title:
                  type: string
                content:
                  type: string
                parentId:
                  type: string
                  nullable: true
                linkedControls:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Template created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'

  /template/{type}/{id}:
    get:
      tags: [templates]
      summary: Get a single template
      security:
        - cookieAuth: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '404':
          description: Not found
    put:
      tags: [templates]
      summary: Update a template (editor+)
      security:
        - cookieAuth: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Template'
      responses:
        '200':
          description: Updated template
    delete:
      tags: [templates]
      summary: Soft-delete a template (admin)
      security:
        - cookieAuth: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted

  /template/{type}/{id}/move:
    put:
      tags: [templates]
      summary: Move template to new parent (contentowner+)
      security:
        - cookieAuth: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                parentId:
                  type: string
                  nullable: true
                sortOrder:
                  type: integer
      responses:
        '200':
          description: Moved
        '400':
          description: Circular reference detected

  /template/{type}/{id}/history:
    get:
      tags: [templates]
      summary: Get version history for a template
      security:
        - cookieAuth: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Array of historical versions

  /template/{type}/{id}/status-history:
    get:
      tags: [templates]
      summary: Get lifecycle status history
      security:
        - cookieAuth: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Array of status change events

  /template/{type}/{id}/attachments:
    post:
      tags: [templates]
      summary: Upload attachment to a template (editor+, multipart/form-data)
      security:
        - cookieAuth: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Attachment metadata

  /template/{type}/{id}/attachments/{attId}/file:
    get:
      tags: [templates]
      summary: Download attachment file
      security:
        - cookieAuth: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: attId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: File binary

  /template/{type}/{id}/attachments/{attId}:
    delete:
      tags: [templates]
      summary: Delete attachment (editor+)
      security:
        - cookieAuth: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: attId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted

  /template/{type}/{id}/permanent:
    delete:
      tags: [templates]
      summary: Permanently delete template (admin)
      security:
        - cookieAuth: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Permanently deleted

  /template/{type}/{id}/restore:
    post:
      tags: [templates]
      summary: Restore soft-deleted template (admin)
      security:
        - cookieAuth: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Restored

  # ─── ENTITIES ────────────────────────────────────────────────────────────

  /entities:
    get:
      tags: [entities]
      summary: List all entities
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Array of entities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Entity'
    post:
      tags: [entities]
      summary: Create entity (admin)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Entity'
      responses:
        '201':
          description: Created entity

  /entities/tree:
    get:
      tags: [entities]
      summary: Get entities as nested tree
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Nested entity tree

  /entities/{id}:
    get:
      tags: [entities]
      summary: Get single entity
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Entity
    put:
      tags: [entities]
      summary: Update entity (admin)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Entity'
      responses:
        '200':
          description: Updated
    delete:
      tags: [entities]
      summary: Delete entity (admin)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted

  # ─── SOA ─────────────────────────────────────────────────────────────────

  /soa:
    get:
      tags: [soa]
      summary: List SoA controls (optionally filtered by framework)
      security:
        - cookieAuth: []
      parameters:
        - name: framework
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Map of control ID → SoA control object
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/SoaControl'

  /soa/frameworks:
    get:
      tags: [soa]
      summary: List active frameworks
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Array of framework keys

  /soa/summary:
    get:
      tags: [soa]
      summary: Compliance summary per framework
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Summary with percentages per framework

  /soa/crossmap:
    get:
      tags: [soa]
      summary: List all cross-mapping theme groups
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Array of theme groups

  /soa/export:
    get:
      tags: [soa]
      summary: Export full SoA as JSON
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Full SoA JSON export

  /soa/{id}:
    put:
      tags: [soa]
      summary: Update a single SoA control (editor+)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: ISO-5.1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SoaControl'
      responses:
        '200':
          description: Updated control

  /soa/{id}/crossmap:
    get:
      tags: [soa]
      summary: Get cross-mapped controls for a given control ID
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cross-mapped controls

  /admin/soa-frameworks:
    get:
      tags: [soa, admin]
      summary: Get framework enable/disable config
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Framework config object
    put:
      tags: [soa, admin]
      summary: Update framework enable/disable config (admin)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Map of framework key → boolean
      responses:
        '200':
          description: Updated

  # ─── RISKS ───────────────────────────────────────────────────────────────

  /risks:
    get:
      tags: [risks]
      summary: List risks
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Array of risks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Risk'
    post:
      tags: [risks]
      summary: Create risk (auditor/contentowner+)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Risk'
      responses:
        '201':
          description: Created risk

  /risks/summary:
    get:
      tags: [risks]
      summary: Risk summary (total, critical, high, top-5)
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Risk summary

  /risks/calendar:
    get:
      tags: [risks]
      summary: Risk-related calendar events (treatment due dates)
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Array of calendar events

  /risks/{id}:
    get:
      tags: [risks]
      summary: Get single risk
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Risk
        '404':
          description: Not found
    put:
      tags: [risks]
      summary: Update risk
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Risk'
      responses:
        '200':
          description: Updated
    delete:
      tags: [risks]
      summary: Soft-delete risk (admin)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted

  /risks/{id}/treatments:
    post:
      tags: [risks]
      summary: Add treatment to risk (auditor+)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                dueDate:
                  type: string
                  format: date
                status:
                  type: string
      responses:
        '201':
          description: Treatment added

  /risks/{id}/treatments/{tpId}:
    put:
      tags: [risks]
